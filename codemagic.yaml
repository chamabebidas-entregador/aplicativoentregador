workflows:
  android-apk:
    name: ChamaBebidas Entregador APK
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - npm install
      - npx expo prebuild --platform android --clean
      - cd android && chmod +x gradlew
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
